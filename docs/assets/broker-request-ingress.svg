<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="360" viewBox="0 0 1320 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3fafc"/>
      <stop offset="50%" stop-color="#c5f6fa"/>
      <stop offset="100%" stop-color="#99e9f2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#0f4c5c"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #102a43; }
      .box { fill: #eef8fb; stroke: #0f4c5c; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 16px Arial, sans-serif; fill: #102a43; }
      .small { font: 14px Arial, sans-serif; fill: #486581; }
      .line { stroke: #0f4c5c; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1320" height="360" fill="url(#bg)"/>
  <text x="40" y="40" class="title">Stellflow Broker Request Ingress Flow</text>
