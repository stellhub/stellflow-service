  <rect x="870" y="100" width="170" height="60" class="box"/>
  <text x="898" y="136" class="text">RequestChannel</text>
  <rect x="1080" y="100" width="170" height="60" class="box"/>
  <text x="1108" y="136" class="text">RequestHandler</text>
  <rect x="1080" y="220" width="170" height="60" class="box"/>
  <text x="1110" y="248" class="text">BrokerApis</text>
  <text x="1105" y="268" class="small">domain dispatch</text>
  <rect x="870" y="220" width="170" height="60" class="box"/>
  <text x="908" y="248" class="text">Encode Response</text>
  <rect x="650" y="220" width="170" height="60" class="box"/>
