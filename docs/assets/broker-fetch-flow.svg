<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="390" viewBox="0 0 1320 390">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7f5ff"/>
      <stop offset="50%" stop-color="#d0ebff"/>
      <stop offset="100%" stop-color="#a5d8ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2a6f97"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #102a43; }
      .box { fill: #eef7ff; stroke: #2a6f97; stroke-width: 2; rx: 14; ry: 14; }
      .decision { fill: #fff3cd; stroke: #bc6c25; stroke-width: 2; }
      .text { font: 16px Arial, sans-serif; fill: #102a43; }
      .small { font: 14px Arial, sans-serif; fill: #486581; }
      .line { stroke: #2a6f97; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1320" height="390" fill="url(#bg)"/>
  <text x="40" y="40" class="title">Stellflow Broker Fetch Flow</text>
  <rect x="40" y="90" width="160" height="60" class="box"/>
  <text x="75" y="126" class="text">FetchRequest</text>
  <rect x="240" y="90" width="180" height="60" class="box"/>
  <text x="264" y="118" class="text">Identify Source</text>
  <text x="262" y="138" class="small">consumer or follower</text>
  <rect x="460" y="90" width="180" height="60" class="box"/>
  <text x="489" y="126" class="text">ReplicaManager</text>
  <rect x="680" y="90" width="180" height="60" class="box"/>
  <text x="713" y="118" class="text">Read Log</text>
  <text x="697" y="138" class="small">HW / LSO visibility</text>
  <polygon points="970,90 1060,120 970,150 880,120" class="decision"/>
  <text x="907" y="125" class="text">Enough Data?</text>
  <rect x="1120" y="90" width="160" height="60" class="box"/>
  <text x="1146" y="126" class="text">Build Fetch</text>
  <rect x="900" y="230" width="180" height="60" class="box"/>
  <text x="928" y="258" class="text">DelayedFetch</text>
  <rect x="650" y="230" width="170" height="60" class="box"/>
  <text x="674" y="258" class="text">Encode Response</text>
  <rect x="420" y="230" width="170" height="60" class="box"/>
  <text x="454" y="258" class="text">Processor Write</text>
  <rect x="190" y="230" width="170" height="60" class="box"/>
  <text x="232" y="258" class="text">Client Reply</text>
  <path d="M200 120 H240" class="line"/>
  <path d="M420 120 H460" class="line"/>
  <path d="M640 120 H680" class="line"/>
  <path d="M860 120 H880" class="line"/>
  <path d="M1060 120 H1120" class="line"/>
  <path d="M970 150 V230" class="line"/>
  <path d="M900 260 H820" class="line"/>
  <path d="M650 260 H590" class="line"/>
  <path d="M420 260 H360" class="line"/>
  <path d="M1120 150 V200 H735" class="line"/>
  <text x="1070" y="110" class="small">Yes</text>
  <text x="980" y="195" class="small">No</text>
</svg>
