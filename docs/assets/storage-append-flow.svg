<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8db"/>
      <stop offset="50%" stop-color="#fff3bf"/>
      <stop offset="100%" stop-color="#ffe066"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#355070"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #1f2933; }
      .box { fill: #f7fbff; stroke: #355070; stroke-width: 2; rx: 14; ry: 14; }
      .decision { fill: #fff4d6; stroke: #b7791f; stroke-width: 2; }
      .text { font: 16px Arial, sans-serif; fill: #243b53; }
      .small { font: 14px Arial, sans-serif; fill: #486581; }
      .line { stroke: #355070; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect x="0" y="0" width="1180" height="360" fill="url(#bg)"/>
  <text x="40" y="40" class="title">Stellflow Storage Append Flow</text>
  <rect x="40" y="80" width="170" height="60" class="box"/>
  <text x="76" y="117" class="text">Append Request</text>
  <rect x="260" y="80" width="190" height="60" class="box"/>
  <text x="291" y="108" class="text">Validate Batch</text>
  <text x="290" y="128" class="small">size, timestamp, format</text>
  <polygon points="530,80 620,110 530,140 440,110" class="decision"/>
  <text x="479" y="115" class="text">Need Roll?</text>
  <rect x="680" y="80" width="180" height="60" class="box"/>
  <text x="718" y="117" class="text">Roll Segment</text>
  <rect x="910" y="80" width="210" height="60" class="box"/>
  <text x="949" y="108" class="text">Append Records</text>
  <text x="953" y="128" class="small">active log segment</text>
  <rect x="910" y="210" width="210" height="60" class="box"/>
  <text x="950" y="238" class="text">Update Indexes</text>
  <text x="939" y="258" class="small">offset/time statistics</text>
  <rect x="680" y="210" width="180" height="60" class="box"/>
  <text x="709" y="238" class="text">Advance LEO</text>
  <text x="704" y="258" class="small">append result meta</text>
  <rect x="440" y="210" width="170" height="60" class="box"/>
  <text x="473" y="238" class="text">Flush Policy</text>
  <text x="471" y="258" class="small">sync or async</text>
  <rect x="210" y="210" width="170" height="60" class="box"/>
  <text x="235" y="238" class="text">Return Append</text>
  <text x="239" y="258" class="small">first/last offset</text>
  <path d="M210 110 H260" class="line"/>
  <path d="M450 110 H440" class="line"/>
  <path d="M620 110 H680" class="line"/>
  <path d="M860 110 H910" class="line"/>
  <path d="M1015 140 V210" class="line"/>
  <path d="M910 240 H860" class="line"/>
  <path d="M680 240 H610" class="line"/>
  <path d="M440 240 H380" class="line"/>
  <path d="M530 140 V180 H1015" class="line"/>
  <text x="639" y="170" class="small">No</text>
  <text x="631" y="99" class="small">Yes</text>
</svg>
